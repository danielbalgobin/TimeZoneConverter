<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Simple Time Converter · Country/State to Timezone</title>
    <!-- moment.js + moment-timezone (lightweight) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data-10-year-range.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #eef2f5;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            line-height: 1.3;
        }
        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            width: 100%;
            max-width: 700px;
            border-radius: 32px;
            padding: 20px 18px 24px;
            box-shadow: 0 15px 30px -12px rgba(0,30,40,0.2);
            border: 1px solid rgba(255,255,255,0.7);
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #123d4f;
            display: flex;
            align-items: center;
            gap: 6px 10px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }
        h1 span {
            background: #1c5a7a;
            color: white;
            font-size: 0.75rem;
            font-weight: 400;
            padding: 4px 12px;
            border-radius: 40px;
            white-space: nowrap;
        }
        .sub {
            color: #2b5d77;
            font-size: 0.95rem;
            margin-bottom: 20px;
            border-left: 3px solid #7fb7d4;
            padding-left: 14px;
        }
        /* zone selects – compact */
        .zone-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
        }
        .zone-item {
            flex: 1 1 200px;
            min-width: 0;
        }
        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #1a5f7a;
            margin-bottom: 4px;
        }
        select {
            width: 100%;
            padding: 10px 28px 10px 14px;
            background: white;
            border: 1px solid #c2d6e8;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #032b38;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%231e5f80" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
            cursor: pointer;
            transition: border 0.1s;
        }
        select:focus {
            outline: none;
            border-color: #2f8ec0;
            box-shadow: 0 0 0 2px rgba(47,142,192,0.2);
        }
        /* input + button row */
        .action-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
        }
        .datetime-wrap {
            flex: 3 1 200px;
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #c2d6e8;
            border-radius: 40px;
            padding: 2px 2px 2px 16px;
        }
        .datetime-wrap span {
            font-size: 1.1rem;
            margin-right: 4px;
        }
        .datetime-wrap input {
            border: none;
            background: transparent;
            padding: 9px 12px 9px 4px;
            font-size: 0.9rem;
            flex: 1;
            min-width: 150px;
            border-radius: 40px;
        }
        .datetime-wrap input:focus {
            outline: none;
        }
        .now-btn {
            background: #1e6f9f;
            border: none;
            color: white;
            padding: 9px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 6px 12px -8px #0d3b55;
            border: 1px solid #ffffff60;
            white-space: nowrap;
            flex: 1 0 auto;
        }
        .now-btn:active {
            background: #13587c;
            transform: scale(0.97);
        }
        /* result card – clean, just the converted time */
        .result {
            background: #dceaf3;
            border-radius: 30px;
            padding: 18px 20px;
            text-align: center;
            box-shadow: inset 0 1px 4px #b2cfdf;
        }
        .converted-time {
            font-size: 1.5rem;
            font-weight: 650;
            color: #03212b;
            line-height: 1.3;
            word-break: break-word;
        }
        .tiny-hint {
            font-size: 0.7rem;
            color: #386277;
            margin-top: 4px;
            opacity: 0.75;
        }
        .footnote {
            margin-top: 22px;
            font-size: 0.75rem;
            color: #497b94;
            text-align: center;
            border-top: 1px dashed #b0cfdf;
            padding-top: 14px;
        }
        /* mobile fine‑tuning */
        @media (max-width: 500px) {
            .card { padding: 16px 14px; }
            h1 { font-size: 1.5rem; }
            .zone-row { flex-direction: column; gap: 10px; }
            .action-row { flex-direction: column; }
            .datetime-wrap { width: 100%; }
            .now-btn { width: 100%; }
            .converted-time { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>
            🌍 Simple Time Converter
            <span>country/state lookup</span>
        </h1>
        <div class="sub">Pick your location and the target timezone — see any moment converted.</div>

        <!-- zone selectors – visible at all times -->
        <div class="zone-row">
            <div class="zone-item">
                <label>📍 from (your zone)</label>
                <select id="fromZone"></select>
            </div>
            <div class="zone-item">
                <label>🎯 to</label>
                <select id="toZone"></select>
            </div>
        </div>

        <!-- pick time & convert -->
        <div class="action-row">
            <div class="datetime-wrap">
                <span>📅</span>
                <input type="datetime-local" id="datetimePicker">
            </div>
            <button class="now-btn" id="nowBtn">now</button>
        </div>

        <!-- pure result – just the converted moment -->
        <div class="result">
            <div class="converted-time" id="conversionResult">—</div>
            <div class="tiny-hint" id="conversionHint"></div>
        </div>

        <div class="footnote">
            🌎 moment-timezone · search “New York”, “London”, “Kolkata”, “Sydney”
        </div>
    </div>

    <script>
        (function() {
            const allZones = moment.tz.names();

            // group zones by first part
            const groups = {};
            allZones.forEach(z => {
                let g = z.split('/')[0] || 'Other';
                if (!groups[g]) groups[g] = [];
                groups[g].push(z);
            });
            // sort groups & zones
            const sortedGroups = Object.keys(groups).sort((a,b)=>a.localeCompare(b));
            sortedGroups.forEach(g => groups[g].sort((x,y)=>x.localeCompare(y)));

            function populate(selectEl) {
                selectEl.innerHTML = '';
                sortedGroups.forEach(group => {
                    const optgroup = document.createElement('optgroup');
                    optgroup.label = group;
                    groups[group].forEach(zone => {
                        const opt = document.createElement('option');
                        opt.value = zone;
                        opt.textContent = zone;
                        optgroup.appendChild(opt);
                    });
                    selectEl.appendChild(optgroup);
                });
            }

            const fromSelect = document.getElementById('fromZone');
            const toSelect = document.getElementById('toZone');
            populate(fromSelect);
            populate(toSelect);

            // set defaults
            const localZone = moment.tz.guess() || 'America/New_York';
            fromSelect.value = localZone;
            toSelect.value = 'Europe/London';

            function fmt(m) {
                return m.format('YYYY-MM-DD HH:mm:ss ddd');
            }

            function update() {
                const from = fromSelect.value;
                const to = toSelect.value;
                if (!from || !to) return;

                const nowFrom = moment.tz(from);
                const picker = document.getElementById('datetimePicker');
                let val = picker.value;
                let baseMoment;
                if (val && val.length >= 16) {
                    baseMoment = moment.tz(val.replace('T',' '), from);
                } else {
                    baseMoment = nowFrom.clone();
                    picker.value = nowFrom.format('YYYY-MM-DDTHH:mm');
                }

                const converted = baseMoment.clone().tz(to);
                document.getElementById('conversionResult').innerHTML = fmt(converted);
                document.getElementById('conversionHint').innerHTML = `${baseMoment.format('HH:mm')} → ${to.split('/').pop()}`;
            }

            document.getElementById('nowBtn').addEventListener('click', ()=>{
                const from = fromSelect.value;
                if (!from) return;
                document.getElementById('datetimePicker').value = moment.tz(from).format('YYYY-MM-DDTHH:mm');
                update();
            });

            fromSelect.addEventListener('change', update);
            toSelect.addEventListener('change', update);
            document.getElementById('datetimePicker').addEventListener('input', update);
            update();
        })();
    </script>
</body>
</html>
